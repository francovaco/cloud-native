apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-sql
data:
  01-init.sql: |
    CREATE DATABASE IF NOT EXISTS metabase CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'metabase'@'%' IDENTIFIED WITH mysql_native_password BY 'M3t4b4s3P4ss!';
